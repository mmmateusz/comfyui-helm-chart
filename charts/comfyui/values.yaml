nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: yanwk/comfyui-boot
  tag: ""  # defaults to Chart.appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  ports:
    - name: comfyui
      port: 8188
      targetPort: 8188
    - name: code-server
      port: 8080
      targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hostname: comfyui.example.com
  tls:
    enabled: false
    secretName: "comfyui-tls"

route:
  enabled: false

  # Set the route apiVersion, e.g. gateway.networking.k8s.io/v1 or gateway.networking.k8s.io/v1alpha2
  apiVersion: gateway.networking.k8s.io/v1

  # Set the route kind. Valid options are GRPCRoute, HTTPRoute, TCPRoute, TLSRoute, UDPRoute
  kind: HTTPRoute

  # Annotations to add to the route
  annotations: {}
  # Labels to add to the route
  extraLabels: {}

  # Hostnames to match for the route
  hostnames: []
  # - "comfyui.example.com"

  # References to the parent resources (e.g. Gateway)
  parentRefs: []
  # - name: my-gateway
  #   namespace: gateway-ns
  #   sectionName: https

  # Enables HTTPS redirect for the route
  httpsRedirect: false

  # Configuration for the HTTP-to-HTTPS redirect route (only used when httpsRedirect is true).
  # If redirect.parentRefs is set, it will be used as-is for the redirect route's parentRefs.
  # Otherwise, the main route's parentRefs are used with sectionName defaulting to "http".
  redirect: {}
  # parentRefs:
  #   - name: my-gateway
  #     sectionName: http

  matches:
    - path:
        type: PathPrefix
        value: /

  # Filters define the filters that are applied to requests that match this rule.
  filters: []

  # Additional custom rules that can be added to the route
  additionalRules: []

  # Backend reference for the route's default rule.
  backendRef:
    # API group of the backend reference. Use "" for the core API group (Service),
    # or "multicluster.x-k8s.io" for ServiceImport.
    group: ""
    # Kind of the backend reference, e.g. Service or ServiceImport.
    kind: Service
    # Port to forward to. Defaults to the first port in service.ports (8188).
    port: ""
    # Weight assigned to this backend for traffic distribution.
    weight: 1

# NVIDIA GPU settings. Requires the NVIDIA device plugin on the cluster.
gpu:
  enabled: true
  count: 1

# CPU/memory resource requests and limits (independent of GPU).
resources: {}
# limits:
#   cpu: "4"
#   memory: "8Gi"
# requests:
#   cpu: "1"
#   memory: "4Gi"

# Liveness / readiness probes (TCP check on the ComfyUI port).
livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 15
  failureThreshold: 6

readinessProbe:
  enabled: true
  initialDelaySeconds: 15
  periodSeconds: 10
  failureThreshold: 3

persistence:
  enabled: true
  # Override with an existing claim to skip PVC creation.
  existingClaim: ""
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 20Gi
  mountPath: /home/runner

# Extra environment variables injected into the container.
env: []
# - name: PASSWORD
#   value: "changeme"

# Environment from ConfigMaps or Secrets.
envFrom: []
# - secretRef:
#     name: my-secret

nodeSelector: {}

# GPU nodes typically require a toleration. Example:
# tolerations:
#   - key: nvidia.com/gpu
#     operator: Exists
#     effect: NoSchedule
tolerations: []

affinity: {}

# Arbitrary extra Kubernetes objects rendered alongside chart resources.
extraObjects: []
# Example — basic-auth secret for ingress-nginx:
# extraObjects:
#   - apiVersion: v1
#     kind: Secret
#     metadata:
#       name: comfyui-basic-auth
#     type: Opaque
#     data:
#       auth: <htpasswd output | base64>
